name: Health Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Service C (CCMS)
        run: curl -I https://elitecoach-ai-ccms.onrender.com/health
      
      - name: Ping Service A (ACS)
        run: curl -I https://elitecoach-ai-acs.onrender.com/health